name: build-and-test
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build --config Release
      - run: ctest --test-dir build -C Release --output-on-failure
      - run: cmake --install build --config Release --prefix "${{ runner.temp }}/ael-install"
      - run: cmake -S tests/install_consumer -B consumer-build -DCMAKE_PREFIX_PATH="${{ runner.temp }}/ael-install"
      - run: cmake --build consumer-build --config Release
      - if: runner.os == 'Linux'
        run: ./consumer-build/ael-package-consumer
      - if: runner.os == 'Windows'
        run: .\consumer-build\Release\ael-package-consumer.exe
